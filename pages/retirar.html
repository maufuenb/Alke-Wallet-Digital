<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirar Fondos | Billetera Digital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body data-page="retirar" data-layout="app" data-title="Retirar Fondos | Billetera Digital">
  <div data-layout-root></div>
  <template data-page-content>
    <section class="card simple-card border-0 p-4 p-md-5">
      <div class="page-hero mb-4">
        <div>
          <span class="badge d-inline-block bg-primary-subtle text-primary">Fondos</span>
          <h2 class="mt-3 mb-1">Retirar Fondos</h2>
          <p class="text-muted mb-0">Mueve tu saldo a una de tus cuentas bancarias de forma simple y clara.</p>
        </div>
        <div class="hero-icon">
          <i class="fa-solid fa-arrow-up-wide-short"></i>
        </div>
      </div>

      <div class="row g-4 align-items-start">
        <div class="col-12 col-xl-7">
          <div class="desktop-flow-column">
            <div class="row g-3 mobile-summary-grid">
              <div class="col-12 col-sm-7 col-lg-7">
                <div class="info-panel h-100">
                  <span class="info-panel__label">Saldo disponible</span>
                  <strong class="info-panel__value" data-current-balance>$ 0</strong>
                  <p class="info-panel__text mb-0">Puedes mover solo el dinero que ya tienes disponible.</p>
                </div>
              </div>
              
            </div>

            <div class="surface-panel deposit-panel h-100">
              <div class="transfer-panel__header">
                <div>
                  <span class="transfer-panel__eyebrow">Paso principal</span>
                  <h3 class="h4 mb-1">¿Cómo quieres retirar?</h3>
                  <p class="text-muted mb-0">Escoge una opción y abriremos una ventana con el paso a paso.</p>
                </div>
              </div>

              <div class="transfer-choice-grid">
                <button type="button" class="transfer-choice-card" data-bs-toggle="modal" data-bs-target="#withdrawBankModal">
                  <span class="transfer-choice-card__icon">
                    <i class="fa-solid fa-building-columns"></i>
                  </span>
                  <span class="transfer-choice-card__content">
                    <span class="transfer-choice-card__title">Entre tus bancos</span>
                    <span class="transfer-choice-card__text">Elige una de tus cuentas registradas y confirma cuánto quieres mover.</span>
                  </span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xl-5 d-none d-xl-block">
          <div class="surface-panel desktop-guide-card h-100">
            <span class="desktop-guide-card__eyebrow">Paso a paso</span>
            <h3 class="desktop-guide-card__title">Como retirar fondos</h3>
            <div class="desktop-guide-list">
              <div class="desktop-guide-list__item">
                <span class="desktop-guide-list__step">1</span>
                <div>
                  <strong>Selecciona tu cuenta</strong>
                  <p class="mb-0 text-muted">Elige a cuál de tus cuentas quieres mover el dinero.</p>
                </div>
              </div>
              <div class="desktop-guide-list__item">
                <span class="desktop-guide-list__step">2</span>
                <div>
                  <strong>Indica el monto</strong>
                  <p class="mb-0 text-muted">Solo puedes retirar el saldo que ya aparece disponible.</p>
                </div>
              </div>
              <div class="desktop-guide-list__item">
                <span class="desktop-guide-list__step">3</span>
                <div>
                  <strong>Confirma el movimiento</strong>
                  <p class="mb-0 text-muted">El retiro queda registrado y el saldo se descuenta en la app.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template data-page-extra>
    <div class="modal fade" id="withdrawBankModal" tabindex="-1" aria-labelledby="withdrawBankModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <span class="section-heading__eyebrow d-block">Paso 1</span>
              <h2 class="modal-title fs-5" id="withdrawBankModalLabel">Mueve saldo entre tus bancos</h2>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <form id="withdrawBankForm" novalidate>
              <div class="mb-3">
                <label for="withdrawBankSource" class="form-label">Tu cuenta de destino</label>
                <select id="withdrawBankSource" class="form-select form-select-lg">
                  <option value="">Selecciona una cuenta</option>
                </select>
                <div class="form-text" id="withdrawBankSourceHelp">Elige cuál de tus cuentas recibirá este retiro.</div>
              </div>

              <div class="surface-panel p-3 mb-3">
                <span class="transfer-panel__eyebrow d-block mb-2">Detalle de tu cuenta</span>
                <div class="small text-muted d-grid gap-2">
                  <div id="withdrawBankHolderHint">Titular: selecciona una cuenta para ver el detalle.</div>
                  <div id="withdrawBankTypeHint">Tipo de cuenta: selecciona una cuenta para ver el detalle.</div>
                  <div id="withdrawBankEtaHint">Tiempo estimado: selecciona una cuenta para ver el detalle.</div>
                </div>
              </div>

              <div class="mb-3">
                <label for="withdrawBankReason" class="form-label">Motivo del movimiento</label>
                <input type="text" class="form-control" id="withdrawBankReason" placeholder="Ej: mover a mi cuenta principal">
                <div class="form-text" id="withdrawBankReasonHint">Te sirve para reconocer después por qué moviste este saldo.</div>
              </div>

              <div class="mb-4">
                <label for="withdrawBankAmount" class="form-label">Monto a mover</label>
                <input type="number" class="form-control form-control-lg" id="withdrawBankAmount" placeholder="Ej: 25000" min="1">
                <div class="form-text" id="withdrawBankSummaryHint">El dinero saldrá de tu saldo disponible y llegará a la cuenta que elijas.</div>
              </div>

              <div class="d-flex flex-column flex-sm-row gap-3">
                <button type="submit" class="btn btn-primary btn-lg flex-fill">Confirmar movimiento</button>
              </div>
              <p id="withdrawBankResult" class="small mt-3 mb-0 d-none"></p>
              <div id="withdrawBankMessage" class="alert d-none mt-3 mb-0" role="alert"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="../assets/js/layout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/retirar.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
