<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de sesión | Billetera Digital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="../assets/css/pages/login.css">
</head>

<body data-page="login" data-layout="auth" data-title="Inicio de sesión | Billetera Digital">
  <div data-layout-root></div>
  <template data-page-content>
    <div class="row justify-content-center w-100">
      <div class="col-12 col-xxl-11">
        <div class="row g-4 align-items-stretch login-shell">
          <div class="col-12 col-lg-6">
            <section class="card simple-card border-0 p-4 p-md-5 h-100 auth-panel login-stage">
              <span class="badge d-inline-flex align-items-center gap-2 bg-primary-subtle text-primary login-stage__badge">
                <i class="fa-solid fa-wave-square"></i>
                Alke Wallet
              </span>

              <div class="login-stage__copy">
                <h2>Tu plata en una vista más clara, rápida y moderna.</h2>
                <p class="text-muted mb-0">Entra a una experiencia simple para revisar tu saldo y mover sin pasos innecesarios.</p>
              </div>

              <div class="login-stage__board mt-4">
                <div class="login-stage__card">
                  <span class="login-stage__eyebrow">Cuenta principal</span>
                  <strong class="login-stage__amount">$245.000</strong>
                  <p class="login-stage__caption mb-0">Disponible para transferir, depositar o mover entre tus bancos con una lectura rápida y ordenada.</p>
                </div>

                <div class="login-stage__metrics">
                  <div class="login-stage__metric">
                    <span class="login-stage__metric-icon"><i class="fa-solid fa-bolt"></i></span>
                    <div>
                      <strong>Abonos al instante</strong>
                      <span>Los movimientos relevantes se reflejan apenas confirmas una acción.</span>
                    </div>
                  </div>
                  <div class="login-stage__metric">
                    <span class="login-stage__metric-icon"><i class="fa-solid fa-shield-halved"></i></span>
                    <div>
                      <strong>Acceso protegido</strong>
                      <span>Una entrada clara para revisar saldo, contactos y transferencias.</span>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>

          <div class="col-12 col-lg-6 col-xl-5" data-auth-login-panel>
            <section class="card simple-card border-0 p-4 p-md-5 h-100 login-panel">
              <button type="button" class="btn btn-outline-secondary btn-sm login-panel__close d-lg-none" data-auth-login-close
                aria-label="Cerrar acceso">
                <i class="fa-solid fa-xmark"></i>
              </button>
              <div class="login-panel__header mb-4">
                <span class="login-panel__eyebrow">Acceso seguro</span>
                <h2 class="mb-1">Bienvenido de vuelta</h2>
                <p class="text-muted mb-0">Ingresa a tu billetera para seguir con tus operaciones del día.</p>
              </div>

              <div class="login-demo-strip mb-4">
                <div>
                  <strong>Modo de prueba</strong>
                  <p class="mb-0 text-muted">Puedes completar los datos demo con un toque.</p>
                </div>
                <button type="button" class="btn btn-outline-primary btn-sm" id="fillDemoAccess">Usar demo</button>
              </div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Correo</label>
                  <div class="login-input-wrap">
                    <span class="login-input-wrap__icon"><i class="fa-solid fa-at"></i></span>
                    <input type="email" class="form-control form-control-lg login-input-wrap__control" id="email"
                      placeholder="nombre@correo.com" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <div class="login-input-wrap">
                    <span class="login-input-wrap__icon"><i class="fa-solid fa-key"></i></span>
                    <input type="password" class="form-control form-control-lg login-input-wrap__control" id="password"
                      placeholder="Ingresa tu contraseña" required>
                    <button type="button" class="login-input-wrap__action" id="togglePassword" aria-label="Mostrar contraseña">
                      <i class="fa-solid fa-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="login-demo-inline mb-4">
                  <span><strong>Correo demo</strong> usuario@wallet.com</span>
                  <span><strong>Clave</strong> 1234</span>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 login-submit">Entrar a mi cuenta</button>
                <div id="loginMessage" class="alert d-none mt-3 mb-0" role="alert"></div>
              </form>
            </section>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="../assets/js/layout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/login.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
