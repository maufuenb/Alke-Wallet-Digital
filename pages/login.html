<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de sesión | Billetera Digital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="page-bg d-flex flex-column" data-page="login">
  <header class="bg-white border-bottom">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0 text-primary">Billetera Digital</h1>
      <span class="text-muted small">Acceso seguro</span>
    </div>
  </header>

  <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-4">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-md-9 col-lg-5">
        <section class="card simple-card border-0 p-4 p-md-5">
          <div class="mb-4">
            <span class="badge d-inline-block bg-primary-subtle text-primary">Billetera Digital</span>
            <h2 class="mt-3 mb-1">Inicio de sesión</h2>
            <p class="text-muted mb-0">Accede a tu cuenta para revisar tu saldo y realizar movimientos.</p>
          </div>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control form-control-lg" id="email" placeholder="nombre@correo.com"
                required>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Contraseña</label>
              <input type="password" class="form-control form-control-lg" id="password"
                placeholder="Ingresa tu contraseña" required>
              <div class="form-text">Credenciales de prueba: usuario@wallet.com y 1234.</div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Iniciar sesión</button>
            <div id="loginMessage" class="alert d-none mt-3 mb-0" role="alert"></div>
          </form>
        </section>
      </div>
    </div>
  </main>

  <footer class="bg-white border-top">
    <div class="container py-3 text-center text-muted small">
      Billetera Digital - Interfaz visual de ejemplo
    </div>
  </footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/login.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
