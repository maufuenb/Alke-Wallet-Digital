<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Últimos Movimientos | Billetera Digital</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="../assets/css/styles.css">
	<link rel="stylesheet" href="../assets/css/pages/transactions.css">
</head>

<body data-page="transactions" data-layout="app" data-title="Últimos Movimientos | Billetera Digital">
	<div data-layout-root></div>
	<template data-page-content>
		<section class="card simple-card border-0 p-4 p-md-5">
			<div class="page-hero mb-4">
				<div>
				<span class="badge d-inline-block bg-primary-subtle text-primary">Actividad</span>
				<h2 class="mt-3 mb-1">Últimos Movimientos</h2>
				<p class="text-muted mb-0">Aquí puedes ver lo último que pasó con tu plata.</p>
				</div>
				<div class="hero-icon">
					<i class="fa-solid fa-chart-line"></i>
				</div>
			</div>

			<div class="row g-3 mb-4">
				<div class="col-12 col-lg-5">
					<div class="surface-panel h-100">
						<label for="movementFilter" class="form-label">Filtrar por tipo de movimiento</label>
						<select id="movementFilter" class="form-select">
							<option value="all">Todos</option>
							<option value="deposit">Depósitos</option>
							<option value="transfer">Transferencias</option>
							<option value="withdrawal">Retiros</option>
						</select>
					</div>
				</div>
				<div class="col-12 col-lg-7">
					<div class="mini-stat h-100">
						<span class="mini-stat__icon"><i class="fa-solid fa-clock-rotate-left"></i></span>
						<div>
							<strong class="mini-stat__title">Historial de actividad</strong>
							<p class="mini-stat__text mb-0">Mira depósitos, envíos y retiros en un solo lugar.</p>
						</div>
					</div>
				</div>
			</div>

			<div class="surface-panel mb-4">
				<div class="section-heading mb-3">
					<div>
						<span class="section-heading__eyebrow">Resumen</span>
						<h3 class="h5 mb-1">Actividad reciente</h3>
						<p class="text-muted mb-0">El historial se organiza en bloques más legibles para desktop y móvil.</p>
					</div>
					<span class="section-heading__icon"><i class="fa-solid fa-wallet"></i></span>
				</div>
				<div class="list-group movement-scroll" data-movement-list></div>
			</div>
		</section>
	</template>

	<script src="../assets/js/layout.js"></script>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="../assets/js/data.js"></script>
	<script src="../assets/js/transactions.js"></script>
	<script src="../assets/js/main.js"></script>
</body>

</html>
