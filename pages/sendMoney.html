<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Dinero | Billetera Digital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body data-page="send-money" data-layout="app" data-title="Enviar Dinero | Billetera Digital">
  <div data-layout-root></div>
  <template data-page-content>
    <section class="card simple-card border-0 p-4 p-md-5">
      <div class="page-hero mb-4">
        <div>
          <span class="badge d-inline-block bg-primary-subtle text-primary">Transferencias</span>
          <h2 class="mt-3 mb-1">Enviar Dinero</h2>
          <p class="text-muted mb-0">Te guiamos paso a paso para que enviar plata sea rápido y claro.</p>
        </div>
        <div class="hero-icon">
          <i class="fa-solid fa-paper-plane"></i>
        </div>
      </div>

      <div class="row g-4 align-items-start">
        <div class="col-12 col-xl-7">
          <div class="desktop-flow-column">
            <div class="row g-3 mobile-summary-grid">
              <div class="col-12 col-sm-7 col-lg-7">
                <div class="info-panel h-100">
                  <div class="balance-header balance-header--compact">
                    <span class="info-panel__label mb-0">Saldo disponible</span>
                    <button type="button" class="balance-visibility-toggle" data-balance-toggle aria-label="Ocultar saldo">
                      <i class="fa-solid fa-eye-slash"></i>
                    </button>
                  </div>
                  <strong class="info-panel__value" data-available-balance data-balance-value>$ 0</strong>
                  <p class="info-panel__text mb-0">Cuando envíes plata, tu saldo se actualiza al instante.</p>
                </div>
              </div>
            </div>

            <div class="surface-panel transfer-panel h-100">
              <div class="transfer-panel__header">
                <div>
                  <span class="transfer-panel__eyebrow">Paso principal</span>
                  <h3 class="h4 mb-1">¿Cómo quieres continuar?</h3>
                  <p class="text-muted mb-0">Elige cómo quieres seguir y te vamos mostrando solo lo necesario.</p>
                </div>
              </div>

              <div class="transfer-choice-grid">
                <button type="button" class="transfer-choice-card" data-bs-toggle="modal" data-bs-target="#newContactModal">
                  <span class="transfer-choice-card__icon">
                    <i class="fa-solid fa-user-plus"></i>
                  </span>
                  <span class="transfer-choice-card__content">
                    <span class="transfer-choice-card__title">Agregar contacto</span>
                    <span class="transfer-choice-card__text">Crea un contacto nuevo para usarlo ahora o más adelante.</span>
                  </span>
                </button>
                <button type="button" class="transfer-choice-card" data-transfer-step="existing">
                  <span class="transfer-choice-card__icon">
                    <i class="fa-solid fa-user-check"></i>
                  </span>
                  <span class="transfer-choice-card__content">
                    <span class="transfer-choice-card__title">Elegir contacto</span>
                    <span class="transfer-choice-card__text">Elige a alguien que ya tengas guardado y seguimos desde ahí.</span>
                  </span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xl-5 d-none d-xl-block">
          <div class="surface-panel desktop-guide-card h-100">
            <span class="desktop-guide-card__eyebrow">Paso a paso</span>
            <h3 class="desktop-guide-card__title">Como enviar dinero</h3>
            <div class="desktop-guide-list">
              <div class="desktop-guide-list__item">
                <span class="desktop-guide-list__step">1</span>
                <div>
                  <strong>Agrega o elige un contacto</strong>
                  <p class="mb-0 text-muted">Puedes crear uno nuevo o seguir con alguien que ya tengas guardado.</p>
                </div>
              </div>
              <div class="desktop-guide-list__item">
                <span class="desktop-guide-list__step">2</span>
                <div>
                  <strong>Indica el monto</strong>
                  <p class="mb-0 text-muted">Escribe cuánto quieres enviar antes de confirmar el movimiento.</p>
                </div>
              </div>
              <div class="desktop-guide-list__item">
                <span class="desktop-guide-list__step">3</span>
                <div>
                  <strong>Confirma el envio</strong>
                  <p class="mb-0 text-muted">La operación queda registrada y tu saldo se actualiza al instante.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template data-page-extra>
    <div class="modal fade" id="existingContactModal" tabindex="-1" aria-labelledby="existingContactModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <span class="section-heading__eyebrow d-block">Paso 1</span>
              <h2 class="modal-title fs-5" id="existingContactModalLabel">Elige un contacto</h2>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <div class="surface-panel autocomplete-box mb-4">
              <label for="contactSearch" class="form-label">Buscar contacto</label>
              <input type="text" id="contactSearch" class="form-control" placeholder="Escribe un nombre, alias o banco">
              <div class="list-group d-none mt-2" id="contactAutocomplete" role="listbox" aria-label="Sugerencias de contactos"></div>
            </div>

            <div class="surface-panel">
              <div class="section-heading mb-3">
                <div>
                  <span class="section-heading__eyebrow">Atajos</span>
                  <h3 class="h5 mb-1">Contactos frecuentes</h3>
                </div>
                <button type="button" class="icon-action-btn" data-bs-toggle="modal" data-bs-target="#newContactModal"
                  aria-label="Agregar nuevo contacto" title="Agregar nuevo contacto">
                  <i class="fa-solid fa-user-plus"></i>
                </button>
              </div>
              <div class="contact-chip-list" data-contact-chips>
                <span class="badge rounded-pill bg-light text-dark border me-2 mb-2 p-2">Ana Perez</span>
              </div>
            </div>

            <div class="transfer-field-group mt-4">
              <label for="contactSelect" class="form-label">Selecciona un contacto</label>
              <select id="contactSelect" class="form-select form-select-lg" required>
                <option value="">Selecciona un contacto</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="transferAmountModal" tabindex="-1" aria-labelledby="transferAmountModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div>
              <span class="section-heading__eyebrow d-block">Paso 2</span>
              <h2 class="modal-title fs-5" id="transferAmountModalLabel">Ingresa el monto</h2>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <form id="transferForm" novalidate>
              <div class="transfer-flow-head mb-4">
                <div>
                  <span class="transfer-flow-head__eyebrow">Contacto seleccionado</span>
                  <strong class="transfer-flow-head__title" data-selected-contact-label>Sin contacto</strong>
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-contact-change>
                  Cambiar contacto
                </button>
              </div>

              <div class="transfer-field-group mb-4">
                <label for="transferAmount" class="form-label">Monto a enviar</label>
                <div class="input-highlight">
                  <span class="input-highlight__prefix">$</span>
                  <input type="number" class="form-control form-control-lg input-highlight__control" id="transferAmount"
                    placeholder="12000" min="1" required>
                </div>
              </div>

              <div class="transfer-submit-row">
                <div class="transfer-submit-copy">
                  <strong>Confirma el envío</strong>
                  <p class="text-muted mb-0">Después lo verás guardado en tu historial sin hacer nada más.</p>
                </div>
                <button type="submit" class="btn btn-primary btn-lg transfer-submit-button">Enviar dinero</button>
              </div>

              <div id="transferMessage" class="alert d-none mt-4 mb-0" role="alert"></div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="newContactModal" tabindex="-1" aria-labelledby="newContactModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="newContactModalLabel">Nuevo contacto</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <form id="newContactForm" novalidate>
              <div class="mb-3">
                <label for="contactName" class="form-label">Nombre y apellido</label>
                <input type="text" class="form-control" id="contactName" placeholder="Ej: Camila Rojas">
              </div>
              <div class="mb-3">
                <label for="contactCbu" class="form-label">Número de CBU</label>
                <input type="text" class="form-control" id="contactCbu" placeholder="Ej: 2850590940090418135204">
              </div>
              <div class="mb-3">
                <label for="contactAlias" class="form-label">Alias</label>
                <input type="text" class="form-control" id="contactAlias" placeholder="camila.rojas">
              </div>
              <div class="mb-3">
                <label for="contactBank" class="form-label">Nombre del Banco</label>
                <input type="text" class="form-control" id="contactBank" placeholder="Ej: Banco Galicia">
              </div>
              <div id="contactMessage" class="alert d-none mt-3 mb-0" role="alert"></div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" id="cancelContactForm" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="newContactForm" class="btn btn-primary">Guardar contacto</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="../assets/js/layout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/send-money.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
