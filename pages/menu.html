<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Principal | Billetera Digital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body data-page="menu" data-layout="app" data-title="Menú Principal | Billetera Digital">
  <div data-layout-root></div>
  <template data-page-content>
    <section class="card simple-card border-0 p-4 p-md-5">
      <div class="mb-4">
        <span class="badge d-inline-block bg-primary-subtle text-primary">Panel</span>
        <h2 class="mt-3 mb-1">Menú Principal</h2>
        <p class="text-muted mb-0">Aquí tienes a mano lo más importante para mover tu plata.</p>
      </div>

      <div id="menuMessage" class="alert alert-info d-none mb-4" role="alert" data-flash-message></div>

      <div class="amount-box bg-primary text-white p-4 mb-4">
        <p class="mb-2">Lo que tienes disponible</p>
        <div class="display-6 fw-bold" data-wallet-balance>$ 245.000</div>
        <p class="mb-0 mt-2">Listo para lo que necesites hacer ahora</p>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-12 col-md-6">
          <div class="mini-stat h-100">
            <span class="mini-stat__icon"><i class="fa-solid fa-bolt"></i></span>
            <div>
              <strong class="mini-stat__title">Acciones directas</strong>
              <p class="mini-stat__text mb-0">Las opciones principales quedan visibles sin perder claridad en pantallas pequeñas.</p>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="mini-stat h-100">
            <span class="mini-stat__icon"><i class="fa-solid fa-mobile-screen-button"></i></span>
            <div>
              <strong class="mini-stat__title">Diseño más flexible</strong>
              <p class="mini-stat__text mb-0">La interfaz se adapta mejor al ancho disponible y mantiene jerarquía visual.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
        <div>
          <h3 class="h5 mb-1">Acciones rápidas</h3>
          <p class="text-muted mb-0">Tus accesos de siempre, más algunas ideas que vienen en camino.</p>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12 col-sm-6 col-md-4 col-xl-3">
          <a href="deposit.html" class="quick-action quick-action--live text-decoration-none" data-redirect-label="depósito">
            <span class="quick-action__icon">
              <i class="fa-solid fa-arrow-down-wide-short"></i>
            </span>
            <span class="quick-action__title">Depositar</span>
            <span class="quick-action__text">Suma plata a tu cuenta en un momento</span>
          </a>
        </div>
        <div class="col-12 col-sm-6 col-md-4 col-xl-3">
          <a href="retirar.html" class="quick-action quick-action--live text-decoration-none" data-redirect-label="retiro de fondos">
            <span class="quick-action__icon">
              <i class="fa-solid fa-arrow-up-wide-short"></i>
            </span>
            <span class="quick-action__title">Retirar</span>
            <span class="quick-action__text">Retira plata de tu billetera cuando quieras</span>
          </a>
        </div>
        <div class="col-12 col-sm-6 col-md-4 col-xl-3">
          <a href="sendMoney.html" class="quick-action quick-action--live text-decoration-none" data-redirect-label="enviar dinero">
            <span class="quick-action__icon">
              <i class="fa-solid fa-paper-plane"></i>
            </span>
            <span class="quick-action__title">Transferir</span>
            <span class="quick-action__text">Manda plata a tus contactos de forma simple</span>
          </a>
        </div>
        <div class="col-12 col-sm-6 col-md-4 col-xl-3">
          <a href="transactions.html" class="quick-action quick-action--live text-decoration-none" data-redirect-label="últimos movimientos">
            <span class="quick-action__icon">
              <i class="fa-solid fa-clock-rotate-left"></i>
            </span>
            <span class="quick-action__title">Movimientos</span>
            <span class="quick-action__text">Mira lo último que pasó en tu cuenta</span>
          </a>
        </div>
        <div class="col-12 col-sm-6 col-md-4 col-xl-3">
          <div class="quick-action quick-action--coming-soon" aria-disabled="true">
            <span class="quick-action__ribbon">Próximamente</span>
            <span class="quick-action__icon">
              <i class="fa-solid fa-mobile-screen-button"></i>
            </span>
            <span class="quick-action__title">Recargas</span>
            <span class="quick-action__text">Recargas, cuentas y otras cosas útiles</span>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-4 col-xl-3">
          <div class="quick-action quick-action--coming-soon" aria-disabled="true">
            <span class="quick-action__ribbon">Próximamente</span>
            <span class="quick-action__icon">
              <i class="fa-solid fa-qrcode"></i>
            </span>
            <span class="quick-action__title">Pagar QR</span>
            <span class="quick-action__text">Escanea y paga sin vueltas</span>
          </div>
        </div>
      </div>
    </section>
  </template>

  <script src="../assets/js/layout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/menu.js"></script>
  <script src="../assets/js/main.js"></script>
</body>

</html>
